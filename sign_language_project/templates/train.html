<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Completed</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #333;
    }
    .container {
      background-color: white;
      padding: 40px 50px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
    }
    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
    }
    .emoji {
      font-size: 60px;
    }
    p {
      font-size: 18px;
      margin: 15px 0 25px 0;
    }
    a {
      text-decoration: none;
      background-color: #4caf50;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      transition: background-color 0.3s ease;
      font-weight: 500;
    }
    a:hover {
      background-color: #388e3c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">✅</div>
    <h2>Model Training Completed!</h2>
    <p>Your model has been successfully trained and is ready for use.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
