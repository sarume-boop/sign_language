<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Language Recognition</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts for modern typography -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-width: 100vw;
      font-family: 'Montserrat', Arial, sans-serif;
      overflow-x: hidden;
      background: #131313;
    }

    /* Animated Neon Gradient Background */
    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      z-index: -2;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(133deg, #00ffc6 0%, #005bea 40%, #fbda61 85%, #ff00c8 100%);
      background-size: 400% 400%;
      opacity: 0.13;
      animation: fadeBG 15s cubic-bezier(.9,.7,.4,1) infinite alternate;
    }
    @keyframes fadeBG { 
      0% { background-position: 0% 50%;}
      100% { background-position: 100% 50%;}
    }

    /* Blurry glass effect panel */
    .glass-panel {
      max-width: 540px;
      margin: 90px auto 0 auto;
      background: rgba(18,28,38,0.57);
      border-radius: 2.2rem;
      box-shadow: 0 12px 60px 0 #00ffc622, 0 2.5px 15px #3f009966;
      backdrop-filter: blur(9px);
      border: 2.8px solid #00ffcc85;
      padding: 44px 38px 34px 38px;
      position: relative;
      z-index: 3;
    }

    h1 {
      font-family: 'Orbitron', 'Montserrat', Arial, sans-serif;
      font-size: 2.7em;
      letter-spacing: 2px;
      margin-bottom: 16px;
      color: #fff;
      text-shadow: 
        0 3px 18px #43e97b, 
        0 5px 55px #007bff99,
        2px 2px 2px #111a, 
        0 0 0 #fff;
      position: relative;
    }

    .emoji-magictwist {
      display: inline-block;
      font-size: 1.1em;
      margin-right: 8px;
      animation: twistIt 2.6s infinite cubic-bezier(.51,-0.42,.41,1.37);
      filter: drop-shadow(0 1px 8px #12ffe7);
    }
    @keyframes twistIt {
      0%,100% { transform: rotate(0deg) scale(1);}
      10% { transform: rotate(22deg) scale(1.09);}
      20% { transform: rotate(-18deg) scale(0.94);}
      30% { transform: rotate(19deg) scale(1.12);}
      40% { transform: rotate(-8deg) scale(1);}
      50% { transform: rotate(10deg) scale(1.04);}
      60% { transform: rotate(0deg) scale(1);}
    }

    p {
      color: #d9feff;
      font-size: 1.3em;
      margin-bottom: 38px;
      letter-spacing: 0.11em;
      text-shadow: 0 5px 24px #00ffc680;
    }

    .nav-actions {
      display: flex;
      flex-direction: column;
      gap: 26px;
      align-items: center;
      margin-bottom: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      outline: none;
      border: none;
      cursor: pointer;
      min-width: 240px;
      padding: 22px 16px;
      background: linear-gradient(90deg, #0029ff 10%, #00ffd7 97%);
      color: #16191a;
      border-radius: 1.5em;
      font-family: 'Orbitron', 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      font-size: 1.25em;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 
        0 4px 18px 2px #00ffcc69, 
        0 1px 10px #00ffc626;
      letter-spacing: 0.04em;
      position: relative;
      transition: 
        background 0.38s cubic-bezier(.8,.2,.3,.99),
        color 0.20s,
        box-shadow 0.35s,
        transform 0.18s;
      filter: brightness(1.05);
      overflow: hidden;
      z-index: 2;
    }

    .btn .btn-icon {
      font-size: 1.2em;
      filter: drop-shadow(0 1px 7px #00ffcc88);
    }
    .btn:hover, .btn:focus {
      background: linear-gradient(90deg, #fbda61 5%, #fe5858 65%, #ff00c8 100%);
      color: #fff;
      transform: scale(1.07) rotate(-2deg);
      box-shadow: 0 10px 34px #ff00c888, 0 6px 18px #fd7e1499;
    }
    .btn:active {
      filter: brightness(0.90);
      transform: scale(0.99);
    }

    /* Magic glow border pulse */
    .btn::after {
      content: '';
      pointer-events: none;
      z-index: 1;
      position: absolute;
      left: 4px; top: 4px;
      width: calc(100% - 8px); height: calc(100% - 8px);
      border-radius: 1.15em;
      background: radial-gradient(circle at 30% 10%, #00ffd6cc 0%, transparent 60%);
      opacity: 0.33;
      transition: opacity 0.27s;
      animation: glowBorder 2.15s infinite alternate;
    }
    @keyframes glowBorder {
      0% { opacity: 0.21;}
      100% { opacity: 0.47;}
    }
    .btn:focus::after, .btn:hover::after {
      opacity: 0.77;
    }

    footer {
      font-size: 1.1em;
      color: #00ffc8cc;
      text-align: center;
      margin: 95px 0 12px 0;
      letter-spacing: .18em;
      text-shadow: 0 1.7px 9px #0014fa99;
      font-weight: 600;
      background: rgba(23,28,38,0.25);
      border-top: 1px solid #00ffc633;
      padding: 28px 8px 4px 8px;
      border-radius: 0 0 2em 2em;
      max-width: 550px;
      box-shadow: 0 1.5px 14px #00ffcc22;
      margin-left: auto;
      margin-right: auto;
    }

    /* Sparkling animated particles (for wow effect!) */
    .particles {
      position: fixed;
      pointer-events: none;
      left: 0; top: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: radial-gradient(#fff6, #00ffd6 54%, transparent 100%);
      box-shadow: 0 3px 17px #38f9d7aa;
      opacity: .8;
      animation: fly 8s linear infinite;
    }
    @keyframes fly {
      from { transform: translateY(100vh) scale(0.7);}
      to   { transform: translateY(-10vh) scale(1.4);}
    }

    @media (max-width: 700px) {
      .glass-panel { padding: 20px 7px 16px 7px; max-width: 97vw; margin: 25px auto 0 auto;}
      h1 { font-size: 1.45em;}
      p { font-size: 0.99em;}
      .btn { font-size: 1em; padding: 13px 12px;}
      .nav-actions { gap: 13px; }
      footer { font-size: 0.95em; max-width: 97vw; margin-top: 37px;}
    }
  </style>
</head>
<body>

  <!-- Decorative Sparkling Particles (JS below) -->
  <div class="particles" id="particles"></div>

  <div class="glass-panel">
    <h1>
      <span class="emoji-magictwist">🖐</span>Sign Language Recognition System
    </h1>
    <p>Recognize hand gestures in real time<br> or from images with advanced AI!</p>

    <div class="nav-actions">
      <a href="/train" class="btn"><span class="btn-icon">📚</span>Train Model</a>
      <a href="/detect" class="btn"><span class="btn-icon">🎥</span>Live Detection</a>
      <a href="/upload" class="btn"><span class="btn-icon">📸</span>Upload Image</a>
    </div>
  </div>

  <footer>
    Developed with ❤️ using Flask, OpenCV, and MediaPipe
  </footer>

  <!-- Particle Animation Script -->
  <script>
    // Adds 30 animated particles
    for(let i=0; i<30; i++){
      let p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random()*98 + 'vw';
      p.style.animationDelay = (Math.random()*7)+'s';
      p.style.width = p.style.height = Math.round(Math.random()*7+6)+'px';
      document.getElementById('particles').appendChild(p);
    }
  </script>
</body>
</html>
